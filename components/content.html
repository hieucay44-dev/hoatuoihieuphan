<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/content.css" rel="stylesheet">


    <title></title>
</head>
<body>
    
    <div class="container">
        <div class="container py-4" style="max-width:1200px">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h3 class="fw-bold text-danger mb-0">
                    🔥 Sản phẩm bán chạy
                </h3>

            </div>

            <div id="bestSaleCarousel"
                class="carousel slide"
                data-bs-ride="carousel">

                <div class="carousel-inner" id="best-sale-carousel">

                </div>

                <button class="carousel-control-prev"
                        type="button"
                        data-bs-target="#bestSaleCarousel"
                        data-bs-slide="prev">

                    <span class="carousel-control-prev-icon bg-dark rounded-circle"></span>

                </button>

                <button class="carousel-control-next"
                        type="button"
                        data-bs-target="#bestSaleCarousel"
                        data-bs-slide="next">

                    <span class="carousel-control-next-icon bg-dark rounded-circle"></span>

                </button>

            </div>

        </div>

        <div class="sort-bar d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">

            <div class="sort-title">
                <i class="fas fa-sort"></i>
                Sắp xếp theo
            </div>

            <select id="sort-select" class="form-select">

                <option value="">Mặc định</option>
                <option value="price-asc">Giá: Thấp → Cao</option>
                <option value="price-desc">Giá: Cao → Thấp</option>
                <option value="name-asc">Tên A → Z</option>
                <option value="name-desc">Tên Z → A</option>
                <option value="sold-desc">Bán chạy nhất</option>
                <option value="newest">Mới nhất</option>

            </select>

        </div>
        <div class="row">
            <div id="product-list" class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3">

            </div>
        </div>
    </div>
    <div class="row my-5">
        <div class="table-responsive">
    <nav>
        <ul id="pagination"
            class="pagination justify-content-center">
        </ul>
    </nav>
</div>
    </div>
</body>
</html>
